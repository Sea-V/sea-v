name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      - run: npm run lint

      - run: node scripts/test-site.mjs

      - name: Supabase security smoke test
        run: node scripts/test-supabase.mjs --step all
        continue-on-error: true
