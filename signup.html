<!DOCTYPE html>
<html lang="en" class="auth-pending">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="48x48" href="/img/favicon-48.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="/img/favicon-96.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png" />
  <meta name="theme-color" content="#071019" />

  <title>SEA-V • Sign Up</title>

  <link rel="stylesheet" href="styles.css?v=155">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/seav-config.js?v=155"></script>
  <script src="js/supabase.js?v=155"></script>
  <script src="js/auth.js?v=155"></script>
  <script src="js/feedback.js?v=155" defer></script>
  <script src="js/core.js?v=155" defer></script>
  <script src="js/signup.js?v=155" defer></script>
</head>

<body class="index-page signup-page">

  <div class="ocean"></div>
  <div class="overlay"></div>

  <div class="container">

    <img src="img/logo.png?v=7" class="logo seav-logo seav-logo--auth" alt="SEA-V" width="120" height="122">

    <form class="login-form" id="signupForm" novalidate>

      <input
        id="signupName"
        name="name"
        type="text"
        placeholder="Full name"
        required
        autocomplete="name"
      >

      <input
        id="signupEmail"
        name="email"
        type="email"
        placeholder="Email address"
        required
        autocomplete="email"
      >

      <input
        id="signupPassword"
        name="password"
        type="password"
        placeholder="Password (8+ characters)"
        required
        autocomplete="new-password"
        minlength="8"
      >

      <input
        id="signupPasswordConfirm"
        name="password_confirm"
        type="password"
        placeholder="Confirm password"
        required
        autocomplete="new-password"
        minlength="8"
      >

      <label class="show-password">
        <input type="checkbox" id="toggleSignupPassword">
        Show passwords
      </label>

      <label class="legal-consent">
        <input type="checkbox" id="signupAcceptLegal" required>
        <span>
          I agree to the
          <a href="terms.html" target="_blank" rel="noopener">Terms of Use</a>
          and
          <a href="privacy.html" target="_blank" rel="noopener">Privacy Policy</a>
        </span>
      </label>

      <button class="login-btn" type="submit" id="signupSubmitBtn">
        Create account
      </button>

      <p class="signup-help">
        <button type="button" class="signup-resend-link" id="btnResendConfirm" hidden>
          Resend confirmation email
        </button>
      </p>

    </form>

    <div id="signupMsg" role="status" aria-live="polite"></div>

    <p class="demo-notice">You’ll receive a confirmation email before your first login.</p>

    <div class="create-account">
      Already have an account?
      <a href="index.html">Log in</a>
    </div>

  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">SEA-V</div>
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="privacy.html">Privacy</a>
        <a href="terms.html">Terms</a>
      </div>
      <div class="footer-copy">© <span id="footerYear"></span> SEA-V</div>
    </div>
  </footer>

  <div id="pageFade"></div>
</body>
</html>
