<!DOCTYPE html>
<html lang="en" class="auth-pending">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEA-V • Sign Up</title>

  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/seav-config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/feedback.js" defer></script>
  <script src="js/core.js?v=29" defer></script>
  <script src="js/signup.js" defer></script>
</head>

<body class="landing-page signup-page">

  <div class="ocean"></div>
  <div class="overlay"></div>

  <main class="signup-shell">

    <div class="signup-panel">

      <img src="img/logo.png?v=6" class="logo signup-logo" alt="SEA-V" width="255" height="260">

      <h1 class="signup-title">Create your account</h1>
      <p class="signup-subtitle">Start building your professional SEA-V profile</p>
      <p class="signup-notice">You’ll receive a confirmation email before your first login.</p>

      <form class="signup-form-modern" id="signupForm" novalidate>

        <input
          id="signupName"
          name="name"
          type="text"
          placeholder="Full name"
          required
          autocomplete="name"
        >

        <input
          id="signupEmail"
          name="email"
          type="email"
          placeholder="Email address"
          required
          autocomplete="email"
        >

        <input
          id="signupPassword"
          name="password"
          type="password"
          placeholder="Password (8+ characters)"
          required
          autocomplete="new-password"
          minlength="8"
        >

        <input
          id="signupPasswordConfirm"
          name="password_confirm"
          type="password"
          placeholder="Confirm password"
          required
          autocomplete="new-password"
          minlength="8"
        >

        <label class="signup-show-password">
          <input type="checkbox" id="toggleSignupPassword">
          Show passwords
        </label>

        <label class="signup-legal-consent">
          <input type="checkbox" id="signupAcceptLegal" required>
          <span>
            I agree to the
            <a href="terms.html" target="_blank" rel="noopener">Terms of Use</a>
            and
            <a href="privacy.html" target="_blank" rel="noopener">Privacy Policy</a>.
          </span>
        </label>

        <button type="submit" class="signup-submit-btn" id="signupSubmitBtn">
          Create account
        </button>

        <p id="signupMsg" class="signup-msg" role="status" aria-live="polite"></p>

        <button type="button" class="btn-ghost2" id="btnResendConfirm" hidden>
          Resend confirmation email
        </button>

      </form>

      <div class="signup-linkline">
        Already have an account?
        <a href="index.html">Log in</a>
      </div>

    </div>

  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">SEA-V</div>
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="privacy.html">Privacy</a>
        <a href="terms.html">Terms</a>
      </div>
      <div class="footer-copy">© <span id="footerYear"></span> SEA-V</div>
    </div>
  </footer>

  <div id="pageFade"></div>
</body>
</html>
