<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Bridge Leader">
  <defs>
    <linearGradient id="bl-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="50%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <filter id="bl-sh" x="-20%" y="-15%" width="140%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="3.5" flood-color="#0F172A" flood-opacity="0.35"/>
    </filter>
  </defs>

  <ellipse cx="60" cy="106" rx="30" ry="5" fill="#0F172A" opacity="0.14"/>

  <g filter="url(#bl-sh)">
    <!-- outer ring -->
    <circle cx="60" cy="56" r="50" fill="none" stroke="url(#bl-ring)" stroke-width="5"/>

    <!-- half navy / half gold disc -->
    <path d="M60 6 A50 50 0 0 0 60 106 L60 6 Z" fill="#0F2744"/>
    <path d="M60 6 A50 50 0 0 1 60 106 L60 6 Z" fill="#D97706"/>

    <!-- subtle shine -->
    <circle cx="60" cy="56" r="50" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1"/>
  </g>

  <!-- helm wheel -->
  <g transform="translate(60,54)" stroke-linecap="round">
    <circle r="30" fill="none" stroke="#FDE68A" stroke-width="3.5"/>
    <circle r="24" fill="none" stroke="#FDE68A" stroke-width="2" opacity="0.55"/>

    <g stroke="#FFFBEB" stroke-width="3">
      <line x1="0" y1="-26" x2="0" y2="26"/>
      <line x1="-26" y1="0" x2="26" y2="0"/>
      <line x1="-18.4" y1="-18.4" x2="18.4" y2="18.4"/>
      <line x1="18.4" y1="-18.4" x2="-18.4" y2="18.4"/>
    </g>

    <!-- handles -->
    <g fill="#FBBF24" stroke="#FFFBEB" stroke-width="1.2">
      <circle cy="-30" r="3.2"/>
      <circle cy="30" r="3.2"/>
      <circle cx="-30" r="3.2"/>
      <circle cx="30" r="3.2"/>
      <circle cx="-21.2" cy="-21.2" r="3"/>
      <circle cx="21.2" cy="-21.2" r="3"/>
      <circle cx="-21.2" cy="21.2" r="3"/>
      <circle cx="21.2" cy="21.2" r="3"/>
    </g>

    <circle r="7" fill="#0F2744" stroke="#FDE68A" stroke-width="2.5"/>
    <circle r="3" fill="#FBBF24"/>
  </g>

  <rect x="24" y="84" width="72" height="20" rx="10" fill="#0F2744" opacity="0.9"/>
  <text x="60" y="97.5" text-anchor="middle"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-size="11" font-weight="800" letter-spacing="1.1" fill="#FDE68A">BRIDGE LEADER</text>

</svg>
