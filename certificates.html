<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEA-V • Certificates</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/seav-config.js?v=25"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js?v=27"></script>
  <script src="js/feedback.js" defer></script>
  <script src="js/core.js?v=27" defer></script>
  <script src="js/seav-upload.js" defer></script>
  <script src="js/seav-data.js" defer></script>
  <script src="js/seav-badges.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" defer></script>
  <script src="js/api-core.js?v=27" defer></script>
  <script src="js/api-mappers.js?v=25" defer></script>
  <script src="js/api.js?v=27" defer></script>
  <script src="js/state.js?v=27" defer></script>
  <script src="js/achievements-engine.js" defer></script>
  <script src="js/badge-unlock.js" defer></script>
  <script src="js/certificates.js?v=32" defer></script>
  <script src="js/certificates-export.js?v=32" defer></script>
</head>
<body class="app-page" data-topbar="app" data-sidebar="app" data-shared-modals="true">

  <div id="topbarMount"></div>

  <main class="dash">
    <div id="sidebarMount"></div>

    <section class="dash-content">
      <article class="cert-shell-card">

        <header class="cert-shell-head">
          <div class="cert-shell-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="6.5" y="4.5" width="11" height="14" rx="2" stroke="currentColor" stroke-width="1.8"/>
              <path d="M9 8h6M9 11h6M10 18.5l2-1.2 2 1.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="cert-shell-title">
            <h2>Certificates</h2>
            <p>Add each certificate once. Expiry date sets the status.</p>
          </div>
          <a class="btn-blue" href="#" data-open="certModal">Add certificate</a>
        </header>

        <div class="cert-list" id="certsList"></div>

        <footer class="cert-shell-foot">
          <a class="cert-foot-link" href="#" id="btnDownloadAllCerts">Download all</a>
          <span class="cert-foot-dot" aria-hidden="true">·</span>
          <a class="cert-foot-link" href="#" id="btnShareAllCerts">Share all</a>
        </footer>

      </article>
    </section>
  </main>

  <div class="modal" id="certShareModal" hidden>
    <div class="modal-card modal-card--gold">
      <div class="modal-head">
        <h3>Share certificates</h3>
        <button type="button" class="modal-x" data-close>&times;</button>
      </div>
      <div class="modal-form">
        <div class="dash-actions">
          <a href="#" class="btn-blue" id="btnShareZipCerts">Share ZIP</a>
          <a href="#" class="btn-ghost2" id="btnEmailCertSummary">Email summary</a>
          <a href="#" class="btn-ghost2" id="btnDownloadZipFromModal">Download ZIP</a>
        </div>
        <p class="modal-footnote" id="certBulkMsg"></p>
      </div>
    </div>
  </div>

  <div class="modal" id="certModal" hidden>
    <div class="modal-card modal-card--gold">
      <div class="modal-head">
        <h3 id="certModalTitle">Add certificate</h3>
        <button type="button" class="modal-x" data-close>&times;</button>
      </div>

      <form class="modal-form" id="certForm">
        <input type="hidden" id="ct_edit_id" />

        <label id="ct_type_wrap">
          Certificate
          <select id="ct_type" required></select>
        </label>

        <label id="ct_name_wrap" hidden>
          Name
          <input id="ct_name" placeholder="Certificate name" />
        </label>

        <div data-date-field="ct_expiry" data-date-label="Expiry date" data-date-optional></div>

        <label>
          File (optional)
          <input type="file" id="ct_file" accept=".pdf,image/*" />
        </label>

        <button class="btn-blue" type="submit">Save</button>
      </form>
    </div>
  </div>

  <div id="sharedModalsMount"></div>
</body>
</html>
