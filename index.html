<!DOCTYPE html>
<html lang="en" class="auth-pending">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico?v=222" sizes="any" />
  <link rel="icon" type="image/png" sizes="48x48" href="/img/favicon-48.png?v=222" />
  <link rel="icon" type="image/png" sizes="96x96" href="/img/favicon-96.png?v=222" />
  <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png?v=222" />
  <meta name="theme-color" content="#071019" />

<meta name="description" content="SEA-V — maritime career platform for yacht crew. Profile, sea time, certificates, CV generator, and shareable public profile." />
<link rel="canonical" href="https://www.sea-v.com/" />

<title>SEA-V — Maritime Career Platform for Yacht Crew</title>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "SEA-V",
  "url": "https://www.sea-v.com/",
  "logo": "https://www.sea-v.com/img/favicon-192.png",
  "description": "Maritime career platform for yacht crew — profile, sea time, certificates, and public CV.",
  "email": "admin@sea-v.com"
}
</script>

<link rel="stylesheet" href="styles.css?v=222">

</head>

<body class="index-page">

<div class="ocean"></div>
<div class="overlay"></div>

<div class="container">

<img src="img/logo.png?v=9" class="logo seav-logo seav-logo--auth" alt="SEA-V" width="120" height="122">

<form class="login-form" id="loginForm" novalidate>

<input
type="email"
name="email"
placeholder="Email address"
required
autocomplete="username"
>

<input
  id="loginPassword"
  class="form-input"
  type="password"
  placeholder="Password"
  required
>

<label class="show-password">
  <input type="checkbox" id="togglePassword">
  Show password
</label>

<button class="login-btn" type="submit">
Login
</button>

<p class="login-help">
  <a href="#" id="forgotPasswordLink">Forgot password?</a>
</p>

</form>

<div id="loginMsg"></div>

<div class="create-account">
Don't have an account?
<a href="signup.html">Create one</a>
</div>

</div>

<div class="modal-overlay" id="emailConfirmedOverlay" hidden></div>

<div class="modal" id="emailConfirmedModal" hidden role="dialog" aria-modal="true" aria-labelledby="emailConfirmedTitle">
  <div class="modal-card modal-card--blue email-confirmed-card">
    <div class="email-confirmed-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" fill="rgba(94, 230, 168, 0.16)" stroke="#5ee6a8" stroke-width="1.6"/>
        <path d="M7.5 12.5l3 3 6-6.5" stroke="#5ee6a8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="modal-head email-confirmed-head">
      <h3 id="emailConfirmedTitle">Email verified</h3>
      <button type="button" class="modal-x" id="emailConfirmedClose" aria-label="Close">&times;</button>
    </div>

    <div class="modal-form">
      <p class="modal-intro">
        Your SEA-V account is active. Log in below using the email and password you created when you signed up.
      </p>
    </div>

    <button type="button" class="login-btn email-confirmed-continue" id="emailConfirmedContinue">
      Continue to login
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/seav-config.js?v=222"></script>
<script src="js/supabase.js?v=222"></script>
<script src="js/auth.js?v=222"></script>
<script src="js/feedback.js?v=222" defer></script>
  <script src="js/core.js?v=222" defer></script>
<script src="js/index.js?v=222" defer></script>

<footer class="site-footer">

  <div class="footer-inner">

    <div class="footer-brand">
      SEA-V
    </div>

    <div class="footer-links">
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
    </div>

   <div class="footer-copy">
  © <span id="footerYear"></span> SEA-V
</div>
  </div>
</footer>

<div id="pageFade"></div>
</body>
</html>
