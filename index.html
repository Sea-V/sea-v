<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SEA-V</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    overflow:hidden;
}

/* animated ocean background */

.ocean{
    position:fixed;
    top:0;
    left:0;
    width:200%;
    height:100%;
    background-image:url("img/ocean.png");
    background-size:cover;
    background-repeat:repeat-x;
    animation:waveMove 60s linear infinite;
}

/* dark overlay */

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(8,18,35,0.45);
}

/* center content */

.container{
    position:relative;
    text-align:center;
    z-index:10;
}

.logo{
    width:600px;
    max-width:80%;
}

.subtitle{
    margin-top:20px;
    font-size:20px;
    opacity:0.9;
}

.note{
    margin-top:10px;
    font-size:40px;
    opacity:0.7;
}

/* animation */

@keyframes waveMove{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-50%);
    }
}

</style>

</head>

<body>

<div class="ocean"></div>
<div class="overlay"></div>

<div class="container">

<img src="img/logo.png" class="logo">

<div class="note">
Platform currently under construction
</div>

</div>

</body>
</html>
