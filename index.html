<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SEA-V</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
    color:white;

    background-image:url("img/ocean.jpg");
    background-size:cover;
    background-position:center;
}

/* dark overlay so logo stands out */

.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(10,20,35,0.45);
}

/* centered content */

.container{
    position:relative;
    text-align:center;
    z-index:2;
}

.logo{
    width:420px;
    max-width:80%;
}

.subtitle{
    margin-top:20px;
    font-size:18px;
    opacity:0.9;
}

.note{
    margin-top:10px;
    font-size:14px;
    opacity:0.7;
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

<img src="img/logo.png" class="logo">

<div class="subtitle">
SEA-V
</div>

<div class="note">
Platform currently under construction
</div>

</div>

</body>
</html>
