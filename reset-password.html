<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="48x48" href="/img/favicon-48.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="/img/favicon-96.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png" />
  <meta name="theme-color" content="#071019" />
  <meta name="robots" content="noindex" />

  <title>SEA-V • Reset Password</title>

  <link rel="stylesheet" href="styles.css?v=208" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/seav-config.js?v=208"></script>
  <script src="js/supabase.js?v=208"></script>
  <script src="js/feedback.js?v=208" defer></script>
  <script src="js/core.js?v=208" defer></script>
  <script src="js/reset-password.js?v=208" defer></script>
</head>

<body class="landing-page reset-password-page">

  <div class="ocean"></div>
  <div class="overlay"></div>

  <main class="reset-password-shell">
    <article class="reset-password-card">

      <div class="reset-password-brand">
        <img src="img/logo.png?v=9" class="seav-logo seav-logo--confirm" alt="SEA-V" width="40" height="41" />
      </div>

      <div id="rpLoading" class="reset-password-state">
        <p class="reset-password-loading">Loading reset link…</p>
      </div>

      <div id="rpReady" class="reset-password-state" hidden>
        <h1 class="reset-password-title">Set a new password</h1>
        <p class="reset-password-subtitle">Choose a new password for your SEA-V account.</p>

        <form id="resetPasswordForm" class="reset-password-form" novalidate>
          <input
            id="rpPassword"
            name="password"
            type="password"
            placeholder="New password (8+ characters)"
            required
            autocomplete="new-password"
            minlength="8"
          >

          <input
            id="rpPasswordConfirm"
            name="password_confirm"
            type="password"
            placeholder="Confirm new password"
            required
            autocomplete="new-password"
            minlength="8"
          >

          <label class="show-password">
            <input type="checkbox" id="toggleRpPassword">
            Show passwords
          </label>

          <button type="submit" class="btn-blue reset-password-btn" id="rpSubmitBtn">
            Set new password
          </button>

          <p id="rpMsg" class="reset-password-msg"></p>
        </form>
      </div>

      <div id="rpError" class="reset-password-state" hidden>
        <h1 class="reset-password-title">Link unavailable</h1>
        <p class="reset-password-subtitle" id="rpErrorText"></p>
        <a class="btn-blue reset-password-btn" href="index.html">Back to SEA-V</a>
      </div>

      <div id="rpSuccess" class="reset-password-state" hidden>
        <h1 class="reset-password-title">Password updated</h1>
        <p class="reset-password-subtitle">Redirecting you to login…</p>
      </div>

    </article>
  </main>

</body>
</html>
