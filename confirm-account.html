<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="48x48" href="/img/favicon-48.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="/img/favicon-96.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png" />
  <meta name="theme-color" content="#071019" />
  <meta name="robots" content="noindex" />

  <title>SEA-V • Confirm Account</title>

  <link rel="stylesheet" href="styles.css?v=216" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/seav-config.js?v=216"></script>
  <script src="js/supabase.js?v=216"></script>
  <script src="js/feedback.js?v=216" defer></script>
  <script src="js/core.js?v=216" defer></script>
  <script src="js/confirm-account.js?v=216" defer></script>
</head>

<body class="landing-page confirm-account-page">

  <div class="ocean"></div>
  <div class="overlay"></div>

  <main class="confirm-account-shell">
    <article class="confirm-account-card">

      <div class="confirm-account-brand">
        <img src="img/logo.png?v=9" class="seav-logo seav-logo--confirm" alt="SEA-V" width="40" height="41" />
      </div>

      <div id="caLoading" class="confirm-account-state">
        <p class="confirm-account-loading">Loading confirmation link…</p>
      </div>

      <div id="caReady" class="confirm-account-state" hidden>
        <h1 class="confirm-account-title">Confirm your account</h1>
        <p class="confirm-account-subtitle" id="caEmailLine">
          Click below to finish creating your SEA-V account.
        </p>
        <button type="button" class="btn-blue confirm-account-btn" id="caConfirmBtn">
          Confirm my account
        </button>
      </div>

      <div id="caError" class="confirm-account-state" hidden>
        <h1 class="confirm-account-title">Link unavailable</h1>
        <p class="confirm-account-subtitle" id="caErrorText"></p>
        <a class="btn-blue confirm-account-btn" href="index.html">Back to SEA-V</a>
      </div>

      <div id="caSuccess" class="confirm-account-state" hidden>
        <h1 class="confirm-account-title">Account confirmed</h1>
        <p class="confirm-account-subtitle">Redirecting you to login…</p>
      </div>

    </article>
  </main>

</body>
</html>
