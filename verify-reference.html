<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEA-V • Verify Reference</title>

  <link rel="stylesheet" href="styles.css?v=7" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/seav-config.js?v=23"></script>
  <script src="js/supabase.js"></script>
  <script src="js/feedback.js" defer></script>
  <script src="js/core.js?v=29" defer></script>
  <script src="js/reference-verification.js?v=23" defer></script>
  <script src="js/verify-reference.js?v=23" defer></script>
</head>

<body class="landing-page verify-reference-page">

  <div class="ocean"></div>
  <div class="overlay"></div>

  <main class="verify-reference-shell">

    <div class="verify-reference-panel">

      <img src="img/logo.png?v=6" class="logo verify-reference-logo" alt="SEA-V" />

      <div id="vrLoading" class="verify-reference-state">
        <p>Loading verification request…</p>
      </div>

      <div id="vrError" class="verify-reference-state" hidden>
        <h1 class="verify-reference-title">Link unavailable</h1>
        <p id="vrErrorText" class="verify-reference-subtitle"></p>
        <a class="btn-blue" href="index.html">Back to SEA-V</a>
      </div>

      <div id="vrSuccess" class="verify-reference-state" hidden>
        <h1 id="vrSuccessTitle" class="verify-reference-title"></h1>
        <p id="vrSuccessText" class="verify-reference-subtitle"></p>
        <a class="btn-blue" href="index.html">Back to SEA-V</a>
      </div>

      <div id="vrContent" hidden>

        <h1 class="verify-reference-title">Verify reference</h1>
        <p class="verify-reference-subtitle">
          <span id="vrRefereeName"></span>, please confirm whether the reference below for
          <strong id="vrCrewName"></strong> is accurate.
        </p>

        <div class="verify-reference-card">
          <div class="verify-reference-meta" id="vrMeta"></div>
          <blockquote class="verify-reference-quote" id="vrReferenceText"></blockquote>
        </div>

        <form id="vrForm" class="verify-reference-form">

          <label class="modal-check">
            <input type="checkbox" id="vrConfirmed" required />
            <span>I confirm this reference is true and approved by me.</span>
          </label>

          <label>
            Optional note
            <textarea id="vrNote" rows="3" placeholder="Brief confirmation (optional)"></textarea>
          </label>

          <div class="modal-grid2">
            <label>
              Your rank / position
              <input id="vrRank" placeholder="Captain, Chief Officer, etc." />
            </label>

            <label>
              CoC number (optional)
              <input id="vrCoc" placeholder="Certificate of competency" />
            </label>
          </div>

          <div class="modal-grid2">
            <label>
              Signature (full name)
              <input id="vrSignature" required placeholder="Type your full name to sign" />
            </label>

            <label>
              Date signed
              <input type="date" id="vrSignedAt" />
            </label>
          </div>

          <div class="verify-reference-actions">
            <button class="btn-blue" type="submit" id="vrConfirmBtn">Confirm reference</button>
            <button class="btn-ghost2" type="button" id="vrDeclineBtn">Decline</button>
          </div>

          <p class="verify-reference-footnote">
            This link is single-use and expires after 14 days. You do not need a SEA-V account.
          </p>

        </form>

      </div>

    </div>

  </main>

</body>
</html>
